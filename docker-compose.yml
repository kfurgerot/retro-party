services:
  frontend:
    build: .
    container_name: retro-party-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend

  backend:
    build: ./server
    container_name: retro-party-backend
    restart: unless-stopped
    env_file:
      - ./.env.local
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: retro-party-postgres
    restart: unless-stopped
    env_file:
      - ./.env.local
    ports:
      - "5432:5432"
    volumes:
      - retro_party_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retro -d retro_party"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  retro_party_postgres_data:
