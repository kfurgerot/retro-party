services:
  frontend:
    build:
      context: .
      args:
        VITE_ENABLE_BOARD_PIXI: ${VITE_ENABLE_BOARD_PIXI:-1}
    container_name: retro-party-frontend-prod
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend

  backend:
    build: ./server
    container_name: retro-party-backend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - ORIGIN=${ORIGIN}
      - POSTGRES_DB=${POSTGRES_DB:-retro_party}
      - POSTGRES_USER=${POSTGRES_USER:-retro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-retro}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retro_party}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-rp_session}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-7}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - LOGIN_RATE_LIMIT_WINDOW_MS=${LOGIN_RATE_LIMIT_WINDOW_MS:-900000}
      - LOGIN_RATE_LIMIT_MAX=${LOGIN_RATE_LIMIT_MAX:-10}
      - API_RATE_LIMIT_WINDOW_MS=${API_RATE_LIMIT_WINDOW_MS:-60000}
      - API_RATE_LIMIT_MAX=${API_RATE_LIMIT_MAX:-300}
      - AUTH_RATE_LIMIT_WINDOW_MS=${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      - AUTH_RATE_LIMIT_MAX=${AUTH_RATE_LIMIT_MAX:-30}
      - MAIL_TEST_RATE_LIMIT_WINDOW_MS=${MAIL_TEST_RATE_LIMIT_WINDOW_MS:-600000}
      - MAIL_TEST_RATE_LIMIT_MAX=${MAIL_TEST_RATE_LIMIT_MAX:-5}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - MAIL_FROM=${MAIL_FROM:-}
      - RESET_PASSWORD_URL_BASE=${RESET_PASSWORD_URL_BASE}
      - RESET_TOKEN_TTL_MINUTES=${RESET_TOKEN_TTL_MINUTES:-60}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: retro-party-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-retro_party}
      - POSTGRES_USER=${POSTGRES_USER:-retro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # No host port exposure by default in production.
    volumes:
      - /volume1/docker/retro-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
